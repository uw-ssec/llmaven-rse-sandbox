# roborev CI Review
# Generated by: roborev init gh-action
# Runs AI-powered code reviews on pull requests.
#
# Required setup:
#   - Add a repository secret named "OPENAI_API_KEY" with your codex API key
#
# Review behavior (types, reasoning, severity) is configured in
# .roborev.toml under the [ci] section.

name: roborev

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    environment: roborev
    if: >-
      !github.event.pull_request.head.repo.fork &&
      github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Install roborev
        env:
          ROBOREV_VERSION: "0.51.0"
          ROBOREV_SHA256: "c9b3062e9424527d6b63178efed1dfc2c7ffb0358e025b723f04cc36dac60ded"
        run: |
          set -euo pipefail
          ARCHIVE="roborev_${ROBOREV_VERSION}_linux_amd64.tar.gz"
          curl -sfLO "https://github.com/roborev-dev/roborev/releases/download/v${ROBOREV_VERSION}/${ARCHIVE}"
          echo "${ROBOREV_SHA256}  ${ARCHIVE}" | sha256sum --check
          mkdir -p "$HOME/.local/bin"
          tar xzf "${ARCHIVE}" -C "$HOME/.local/bin" roborev
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          rm -f "${ARCHIVE}"
          "$HOME/.local/bin/roborev" version

      - name: Install codex
        env:
          CODEX_VERSION: "0.118.0"
          CODEX_SHA256: "220f15ca1c639e905aae385da960e1897882fee76653f5f9f5dffa5f754f7c98"
        run: |
          set -euo pipefail
          ARCHIVE="codex-x86_64-unknown-linux-gnu.tar.gz"
          curl -sfLO "https://github.com/openai/codex/releases/download/rust-v${CODEX_VERSION}/${ARCHIVE}"
          echo "${CODEX_SHA256}  ${ARCHIVE}" | sha256sum --check
          mkdir -p "$HOME/.local/bin"
          tar xzf "${ARCHIVE}" -C "$HOME/.local/bin"
          mv "$HOME/.local/bin/codex-x86_64-unknown-linux-gnu" "$HOME/.local/bin/codex"
          rm -f "${ARCHIVE}"
          codex --version

      - name: Configure codex
        env:
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
        run: |
          set -euo pipefail
          if [[ ! "$OPENAI_BASE_URL" =~ ^https://[a-zA-Z0-9._/:-]+$ ]]; then
            echo "::error::OPENAI_BASE_URL must be a valid https:// URL with no special characters"
            exit 1
          fi
          echo 'tomli-w==1.2.0 --hash=sha256:188306098d013b691fcadc011abd66727d3c414c571bb01b1a174ba8c983cf90' > /tmp/requirements.txt
          pip install --require-hashes --no-deps -r /tmp/requirements.txt
          rm -f /tmp/requirements.txt
          mkdir -p ~/.codex
          python3 -c "
          import os
          import tomli_w
          config = {
              'model': 'gpt-5.3-codex',
              'model_provider': 'uw-ssec',
              'model_providers': {
                  'uw-ssec': {
                      'name': 'UW-SSEC LiteLLM Proxy',
                      'env_key': 'OPENAI_API_KEY',
                      'base_url': os.environ['OPENAI_BASE_URL'],
                  }
              }
          }
          with open(os.path.expanduser('~/.codex/config.toml'), 'wb') as f:
              tomli_w.dump(config, f)
          "

      - name: Run review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
        run: |
          set -euo pipefail
          roborev ci review \
            --ref "${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" \
            --comment \
            --gh-repo "${{ github.repository }}" \
            --pr "${{ github.event.pull_request.number }}"
